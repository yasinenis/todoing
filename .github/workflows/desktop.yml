name: Masaüstü (Electron) build

# Elle tetikle (Actions sekmesinden "Run workflow") veya v* etiketi push'la.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Installer üret (electron-builder)
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Çıktıları yükle
        uses: actions/upload-artifact@v4
        with:
          name: todoing-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.exe
          if-no-files-found: ignore
