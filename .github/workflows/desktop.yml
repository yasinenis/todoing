name: Masaüstü (Electron) — build & release

# v* etiketi push'lanınca 3 işletim sistemi için derler ve GitHub Release yayınlar.
# "Run workflow" ile elle de tetiklenebilir (etiket yoksa sadece derler, yayınlamaz).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Sürümü etiketten al (otomatik güncelleme sürüm karşılaştırması için)
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION_ARG=-c.extraMetadata.version=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION_ARG=" >> "$GITHUB_ENV"
          fi

      - name: Installer üret (electron-builder)
        run: npm run electron:build -- $VERSION_ARG

      - name: Çıktıları yükle
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Tüm installer'ları indir
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: GitHub Release oluştur/güncelle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: installers/**/*
