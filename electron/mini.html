<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TodoIng</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      .card {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 0 10px 0 16px;
        background: #161a26;
        border: 1px solid #2a3142;
        border-radius: 999px; /* oval (pill) kenarlar */
        color: #e7ebf3;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
        cursor: pointer; /* tıklayınca uygulamaya dön */
        transition: background 0.15s;
      }
      .card:hover {
        background: #1c2233;
      }
      .card:active {
        background: #222a3e;
      }
      .logo {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        flex: 0 0 auto;
        object-fit: contain;
      }
      .mid {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
        line-height: 1.05;
      }
      .time {
        font-size: 24px;
        font-weight: 200;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.5px;
        white-space: nowrap;
      }
      .sub {
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #8a93a6;
      }
      /* Hover'da beliren gizli "Gizle" butonu */
      .hide {
        flex: 0 0 auto;
        border: none;
        background: #2a3142;
        color: #aeb6c6;
        font-size: 10px;
        font-weight: 500;
        padding: 4px 9px;
        border-radius: 999px;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
        white-space: nowrap;
        transition:
          opacity 0.15s,
          background 0.15s,
          color 0.15s;
      }
      .card:hover .hide {
        opacity: 1;
        pointer-events: auto;
      }
      .hide:hover {
        background: #39425a;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="card" id="card" title="TodoIng'i aç">
      <img class="logo" src="mini-icon.png" alt="TodoIng" />
      <div class="mid">
        <span class="time" id="time">00:00</span>
        <span class="sub" id="sub">TodoIng</span>
      </div>
      <button class="hide" id="hide" title="Popup'ı gizle">Gizle</button>
    </div>
    <script>
      const $time = document.getElementById("time");
      const $sub = document.getElementById("sub");
      const $card = document.getElementById("card");
      const $hide = document.getElementById("hide");

      if (window.mini) {
        window.mini.onState((s) => {
          $time.textContent = s.label || "00:00";
          $sub.textContent = s.running ? "Çalışıyor" : "Duraklatıldı";
        });
        // Popup'a tıklayınca uygulamayı öne getir.
        $card.addEventListener("click", () => window.mini.focusApp());
        // "Gizle" → popup'ı sakla (kart tıklamasını tetikleme).
        $hide.addEventListener("click", (e) => {
          e.stopPropagation();
          window.mini.hide();
        });
      }
    </script>
  </body>
</html>
